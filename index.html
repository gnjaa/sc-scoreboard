<html>

<head>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="container">
        <div>
            <h3>HOME</h3>
            <div id="score-home">0</div>
            <div id="add-points-home">
                <button id="add-points-home-1" onclick="addPointsHome1()">+1</button>
                <button id="add-points-home-2" onclick="addPointsHome2()">+2</button>
                <button id="add-points-home-3" onclick="addPointsHome3()">+3</button>
            </div>
        </div>
        <div>
            <h3>GUEST</h3>
            <div id="score-guest">0</div>
            <div id="add-points-guest">
                <button id="add-points-guest-1" onclick="addPointsGuest1()">+1</button>
                <button id="add-points-guest-2" onclick="addPointsGuest2()">+2</button>
                <button id="add-points-guest-3" onclick="addPointsGuest3()">+3</button>
            </div>
        </div>
        <div id="button-container">
            <button id="reset-scores" onclick="resetScores()">Reset</button>
        </div>
    </div>


    <script src="index.js"></script>
</body>

</html>
